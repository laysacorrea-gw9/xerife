<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xerife GW9 — Dashboard de Conversas</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --wpp-green:#075e54;
  --wpp-green-light:#128c7e;
  --wpp-teal:#25d366;
  --wpp-blue:#34b7f1;
  --wpp-bg:#e5ddd5;
  --wpp-chat-bg:#efeae2;
  --wpp-bubble-out:#dcf8c6;
  --wpp-bubble-in:#ffffff;
  --wpp-header:#ededed;
  --wpp-hover:#f5f5f5;
  --wpp-selected:#e0f2f1;
  --wpp-system:#ffeeba;
  --status-quente:#e53935;
  --status-morno:#fdd835;
  --status-frio:#1e88e5;
  --status-desinteresse:#9e9e9e;
  --font-stack:'Segoe UI',Helvetica,Arial,sans-serif;
}
html,body{height:100%;font-family:var(--font-stack);background:#ddd;overflow:hidden}

/* ── Loading overlay ── */
#loading-overlay{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s}
#loading-overlay.hidden{opacity:0;pointer-events:none}
.spinner{width:48px;height:48px;border:4px solid #e0e0e0;border-top-color:var(--wpp-green);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading-overlay p{margin-top:16px;color:#555;font-size:15px}

/* ── Error state ── */
#error-state{display:none;position:fixed;inset:0;background:#fff;flex-direction:column;align-items:center;justify-content:center;z-index:9998}
#error-state.visible{display:flex}
#error-state h2{color:var(--status-quente);margin-bottom:8px}
#error-state p{color:#666;margin-bottom:16px;max-width:400px;text-align:center}
#error-state button{padding:10px 24px;background:var(--wpp-green);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px}

/* ── Top bar ── */
#top-bar{height:40px;background:var(--wpp-green);display:flex;align-items:center;justify-content:space-between;padding:0 16px;color:#fff;font-size:13px}
#top-bar .stats span{margin-left:12px;opacity:.9}
#refresh-indicator{display:flex;align-items:center;gap:6px;font-size:12px;opacity:.8}
#refresh-indicator .mini-spin{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
#refresh-indicator.refreshing .mini-spin{display:inline-block}

/* ── Main layout ── */
#app{display:flex;height:calc(100vh - 40px);max-width:100%;background:var(--wpp-chat-bg)}

/* ── Left panel ── */
#left-panel{width:30%;min-width:280px;max-width:420px;display:flex;flex-direction:column;background:#fff;border-right:1px solid #ddd}
#left-header{background:var(--wpp-header);padding:10px 12px}
#left-header h1{font-size:16px;color:var(--wpp-green);margin-bottom:8px;display:flex;align-items:center;gap:6px}
#search-box{width:100%;padding:7px 12px;border:none;border-radius:20px;background:#f0f0f0;font-size:13px;outline:none}
#search-box:focus{background:#e8e8e8}
#filter-bar{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}
.filter-btn{padding:4px 10px;border:none;border-radius:14px;font-size:11px;cursor:pointer;background:#e0e0e0;color:#333;transition:all .2s}
.filter-btn.active{background:var(--wpp-green);color:#fff}
.filter-btn:hover:not(.active){background:#ccc}

#chat-list{flex:1;overflow-y:auto;overflow-x:hidden}
#chat-list::-webkit-scrollbar{width:6px}
#chat-list::-webkit-scrollbar-thumb{background:#bbb;border-radius:3px}

.chat-item{display:flex;align-items:center;padding:10px 12px;cursor:pointer;border-bottom:1px solid #f0f0f0;transition:background .15s;gap:10px;position:relative}
.chat-item:hover{background:var(--wpp-hover)}
.chat-item.selected{background:var(--wpp-selected)}
.chat-avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:18px;flex-shrink:0;position:relative}
.chat-avatar .status-dot{position:absolute;bottom:1px;right:1px;width:10px;height:10px;border-radius:50%;border:2px solid #fff}
.chat-info{flex:1;min-width:0}
.chat-name-row{display:flex;justify-content:space-between;align-items:center}
.chat-name{font-weight:600;font-size:14px;color:#111;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-time{font-size:11px;color:#999;white-space:nowrap;margin-left:8px}
.chat-preview-row{display:flex;justify-content:space-between;align-items:center;margin-top:2px}
.chat-preview{font-size:12px;color:#777;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.chat-badges{display:flex;gap:4px;align-items:center;margin-left:6px;flex-shrink:0}
.msg-count-badge{background:var(--wpp-teal);color:#fff;font-size:10px;padding:1px 6px;border-radius:10px;font-weight:600}
.bot-badge{font-size:12px}

/* ── Center panel ── */
#center-panel{flex:1;display:flex;flex-direction:column;min-width:320px}
#chat-header{height:56px;background:var(--wpp-header);display:flex;align-items:center;padding:0 16px;gap:12px;border-bottom:1px solid #ddd}
#chat-header .header-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px}
#chat-header-info{flex:1}
#chat-header-name{font-size:15px;font-weight:600;color:#111}
#chat-header-sub{font-size:12px;color:#777}

#chat-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#999;gap:12px}
#chat-empty .icon{font-size:60px;opacity:.4}
#chat-empty p{font-size:14px}

#chat-messages{flex:1;overflow-y:auto;padding:16px 40px;background:var(--wpp-chat-bg);position:relative}
#chat-messages::before{content:'';position:absolute;inset:0;background-image:url("data:image/svg+xml,%3Csvg width='300' height='300' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3Cpattern id='p' width='40' height='40' patternUnits='userSpaceOnUse'%3E%3Ccircle cx='20' cy='20' r='1' fill='%23cdc5b4' opacity='.25'/%3E%3C/pattern%3E%3C/defs%3E%3Crect fill='url(%23p)' width='300' height='300'/%3E%3C/svg%3E");pointer-events:none;z-index:0}
#chat-messages::-webkit-scrollbar{width:6px}
#chat-messages::-webkit-scrollbar-thumb{background:#bbb;border-radius:3px}

.msg-bubble{max-width:65%;padding:6px 10px 14px;margin-bottom:4px;border-radius:8px;position:relative;z-index:1;font-size:13.5px;line-height:1.45;word-wrap:break-word;white-space:pre-wrap;box-shadow:0 1px 1px rgba(0,0,0,.08)}
.msg-bubble .msg-time{position:absolute;bottom:2px;right:8px;font-size:10px;color:#999;white-space:nowrap}
.msg-user{background:var(--wpp-bubble-in);align-self:flex-start;border-top-left-radius:0}
.msg-ai{background:var(--wpp-bubble-out);align-self:flex-end;border-top-right-radius:0}
.msg-system{align-self:center;background:#fdf4d5;border-radius:6px;font-size:12px;color:#6b5900;padding:4px 12px;text-align:center;max-width:80%;box-shadow:none}
.msg-system .msg-time{position:static;display:block;margin-top:2px;font-size:10px;color:#a08c40}

.msg-wrapper{display:flex;flex-direction:column;margin-bottom:2px}

.system-data-toggle{font-size:11px;color:var(--wpp-green-light);cursor:pointer;margin-bottom:2px;text-decoration:underline;z-index:1;position:relative}
.system-data-content{display:none;background:#f7f7f7;border:1px solid #e0e0e0;border-radius:6px;padding:6px 10px;font-size:11px;color:#555;white-space:pre-wrap;margin-bottom:4px;max-height:200px;overflow-y:auto;z-index:1;position:relative;line-height:1.4}
.system-data-content.open{display:block}

.date-divider{display:flex;align-items:center;justify-content:center;margin:12px 0;z-index:1;position:relative}
.date-divider span{background:#e1ddd3;color:#555;font-size:11px;padding:4px 14px;border-radius:8px;box-shadow:0 1px 1px rgba(0,0,0,.06)}

/* ── Right panel ── */
#right-panel{width:30%;min-width:280px;max-width:400px;background:#fff;border-left:1px solid #ddd;overflow-y:auto;display:none}
#right-panel.visible{display:block}
#right-panel::-webkit-scrollbar{width:6px}
#right-panel::-webkit-scrollbar-thumb{background:#bbb;border-radius:3px}

#right-header{background:var(--wpp-header);padding:16px;text-align:center;border-bottom:1px solid #ddd}
#right-avatar{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:32px;margin:0 auto 8px}
#right-name{font-size:17px;font-weight:600;color:#111}
#right-phone{font-size:13px;color:#666;margin-top:2px}
#right-email{font-size:12px;color:var(--wpp-green-light);margin-top:2px;word-break:break-all}

.detail-section{border-bottom:1px solid #f0f0f0}
.detail-section-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;font-size:13px;font-weight:600;color:#333;user-select:none}
.detail-section-header:hover{background:#f9f9f9}
.detail-section-header .chevron{transition:transform .2s;font-size:11px;color:#999}
.detail-section-header .chevron.open{transform:rotate(90deg)}
.detail-section-body{padding:0 16px 12px;font-size:13px;color:#444;line-height:1.6;display:none}
.detail-section-body.open{display:block}
.detail-section-body dt{font-weight:600;color:#666;font-size:11px;text-transform:uppercase;margin-top:6px}
.detail-section-body dd{margin:0 0 2px;color:#222}
.detail-section-body ul{list-style:none;padding:0}
.detail-section-body ul li{padding:2px 0;font-size:12px;color:#444}
.detail-section-body ul li::before{content:'• ';color:var(--wpp-green)}

.formatted-block{background:#f5f5f5;border:1px solid #e0e0e0;border-radius:6px;padding:10px;font-family:'Courier New',monospace;font-size:11px;white-space:pre-wrap;line-height:1.5;color:#333;max-height:300px;overflow-y:auto;margin-top:8px}

.temp-badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:600;color:#fff}
.temp-quente{background:var(--status-quente)}
.temp-morno{background:var(--status-morno);color:#333}
.temp-frio{background:var(--status-frio)}
.temp-desinteresse{background:var(--status-desinteresse)}

/* ── Responsive ── */
@media(max-width:900px){
  #right-panel{display:none!important}
  #left-panel{width:35%;min-width:200px}
}
@media(max-width:600px){
  #left-panel{width:100%;max-width:none}
  #center-panel{display:none}
  #left-panel.chat-open{display:none}
  #center-panel.chat-open{display:flex;width:100%}
}
</style>
</head>
<body>

<div id="loading-overlay"><div class="spinner"></div><p>Carregando conversas...</p></div>
<div id="error-state"><h2>Erro ao carregar dados</h2><p id="error-msg"></p><button onclick="loadData()">Tentar novamente</button></div>

<div id="top-bar">
  <div class="stats" id="top-stats"></div>
  <div id="refresh-indicator"><span class="mini-spin"></span><span id="refresh-text">Atualiza em 5:00</span></div>
</div>

<div id="app">
  <!-- Left Panel -->
  <div id="left-panel">
    <div id="left-header">
      <h1>&#x1F50D; Xerife GW9</h1>
      <input type="text" id="search-box" placeholder="Buscar por nome, telefone ou cidade...">
      <div id="filter-bar">
        <button class="filter-btn active" data-filter="todos">Todos</button>
        <button class="filter-btn" data-filter="quente">&#x1F525; Quentes</button>
        <button class="filter-btn" data-filter="morno">&#x1F7E1; Mornos</button>
        <button class="filter-btn" data-filter="frio">&#x1F535; Frios</button>
        <button class="filter-btn" data-filter="desinteresse">&#x274C; Perdidos</button>
      </div>
    </div>
    <div id="chat-list"></div>
  </div>

  <!-- Center Panel -->
  <div id="center-panel">
    <div id="chat-header" style="display:none"></div>
    <div id="chat-empty"><span class="icon">&#x1F4AC;</span><p>Selecione uma conversa para visualizar</p></div>
    <div id="chat-messages" style="display:none"></div>
  </div>

  <!-- Right Panel -->
  <div id="right-panel"></div>
</div>

<script>
const DATA_URL='https://raw.githubusercontent.com/laysacorrea-gw9/xerife/main/data/dashboard.json';
const REFRESH_INTERVAL=300;
let allData=null, filteredConversations=[], selectedId=null, refreshTimer=null, refreshCountdown=REFRESH_INTERVAL;

const statusColors={quente:'var(--status-quente)',morno:'var(--status-morno)',frio:'var(--status-frio)',desinteresse:'var(--status-desinteresse)'};

function $(s,p){return(p||document).querySelector(s)}
function $$(s,p){return[...(p||document).querySelectorAll(s)]}

// ── Time helpers ──
function relativeTime(iso){
  if(!iso)return'';
  const d=new Date(iso),now=new Date(),diff=now-d;
  const mins=Math.floor(diff/60000),hrs=Math.floor(diff/3600000),days=Math.floor(diff/86400000);
  if(mins<1)return'agora';
  if(mins<60)return`${mins}min`;
  if(hrs<24)return`${hrs}h`;
  if(days<7)return`${days}d`;
  return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
}
function formatTime(iso){
  if(!iso)return'';
  const d=new Date(iso);
  return d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
}
function formatDate(iso){
  if(!iso)return'';
  return new Date(iso).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'});
}
function formatDateTime(iso){
  if(!iso)return'';
  const d=new Date(iso);
  return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'})+' '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
}

// ── Data loading ──
async function loadData(){
  $('#loading-overlay').classList.remove('hidden');
  $('#error-state').classList.remove('visible');
  try{
    const r=await fetch(DATA_URL+'?t='+Date.now());
    if(!r.ok)throw new Error('HTTP '+r.status);
    allData=await r.json();
    $('#loading-overlay').classList.add('hidden');
    renderStats();
    applyFilters();
    if(selectedId){
      const conv=allData.conversations.find(c=>c.session_id===selectedId);
      if(conv){renderChat(conv);renderDetails(conv)}
    }
    resetRefreshTimer();
  }catch(e){
    $('#loading-overlay').classList.add('hidden');
    if(!allData){$('#error-msg').textContent=e.message;$('#error-state').classList.add('visible')}
  }
}

function resetRefreshTimer(){
  clearInterval(refreshTimer);
  refreshCountdown=REFRESH_INTERVAL;
  refreshTimer=setInterval(()=>{
    refreshCountdown--;
    if(refreshCountdown<=0){
      $('#refresh-indicator').classList.add('refreshing');
      $('#refresh-text').textContent='Atualizando...';
      loadData().finally(()=>$('#refresh-indicator').classList.remove('refreshing'));
      return;
    }
    const m=Math.floor(refreshCountdown/60),s=refreshCountdown%60;
    $('#refresh-text').textContent=`Atualiza em ${m}:${String(s).padStart(2,'0')}`;
  },1000);
}

// ── Stats ──
function renderStats(){
  if(!allData)return;
  const s=allData.meta.stats;
  $('#top-stats').innerHTML=`
    <span>&#x1F4CA; ${allData.meta.total_conversations} conversas</span>
    <span>&#x1F525; ${s.quente||0} quentes</span>
    <span>&#x1F7E1; ${s.morno||0} mornos</span>
    <span>&#x1F535; ${s.frio||0} frios</span>
    <span style="opacity:.7">Atualizado: ${formatDateTime(allData.meta.generated_at)}</span>
  `;
}

// ── Filters ──
function applyFilters(){
  if(!allData)return;
  const activeFilter=($('.filter-btn.active')||{}).dataset?.filter||'todos';
  const query=$('#search-box').value.toLowerCase().trim();
  filteredConversations=allData.conversations.filter(c=>{
    if(activeFilter!=='todos'&&c.status!==activeFilter)return false;
    if(query){
      const name=(c.lead?.nome||c.summary?.nome||'').toLowerCase();
      const phone=(c.phone_display||c.phone||'').toLowerCase();
      const city=(c.summary?.cidade||'').toLowerCase();
      if(!name.includes(query)&&!phone.includes(query)&&!city.includes(query))return false;
    }
    return true;
  });
  filteredConversations.sort((a,b)=>new Date(b.last_message_at)-new Date(a.last_message_at));
  renderChatList();
}

$$('.filter-btn').forEach(btn=>btn.addEventListener('click',()=>{
  $$('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}));
$('#search-box').addEventListener('input',()=>applyFilters());

// ── Chat list ──
function renderChatList(){
  const list=$('#chat-list');
  list.innerHTML='';
  if(!filteredConversations.length){
    list.innerHTML='<div style="padding:24px;text-align:center;color:#999;font-size:13px">Nenhuma conversa encontrada</div>';
    return;
  }
  filteredConversations.forEach(c=>{
    const name=c.lead?.nome||c.summary?.nome||c.phone_display||'Desconhecido';
    const initial=name.charAt(0).toUpperCase();
    const color=statusColors[c.status]||'#999';
    const el=document.createElement('div');
    el.className='chat-item'+(c.session_id===selectedId?' selected':'');
    el.dataset.id=c.session_id;
    el.innerHTML=`
      <div class="chat-avatar" style="background:${color}">
        ${initial}
        <div class="status-dot" style="background:${color}"></div>
      </div>
      <div class="chat-info">
        <div class="chat-name-row">
          <span class="chat-name">${esc(name)}</span>
          <span class="chat-time">${relativeTime(c.last_message_at)}</span>
        </div>
        <div class="chat-preview-row">
          <span class="chat-preview">${esc(c.last_message_preview||'')}</span>
          <div class="chat-badges">
            <span class="bot-badge">${c.bot==='amarelo'?'\u{1F7E1}':'\u{26AB}'}</span>
            <span class="msg-count-badge">${c.message_count||0}</span>
          </div>
        </div>
      </div>
    `;
    el.addEventListener('click',()=>selectConversation(c));
    list.appendChild(el);
  });
}

function selectConversation(c){
  selectedId=c.session_id;
  $$('.chat-item').forEach(el=>el.classList.toggle('selected',el.dataset.id===selectedId));
  renderChat(c);
  renderDetails(c);
  // mobile
  $('#left-panel').classList.add('chat-open');
  $('#center-panel').classList.add('chat-open');
}

// ── Chat messages ──
function renderChat(c){
  const header=$('#chat-header');
  const msgs=$('#chat-messages');
  const empty=$('#chat-empty');
  const name=c.lead?.nome||c.summary?.nome||'Desconhecido';
  const initial=name.charAt(0).toUpperCase();
  const color=statusColors[c.status]||'#999';

  header.style.display='flex';
  header.innerHTML=`
    <div class="header-avatar" style="background:${color}">${initial}</div>
    <div id="chat-header-info">
      <div id="chat-header-name">${esc(name)}</div>
      <div id="chat-header-sub">${esc(c.phone_display||'')} &middot; ${tempLabel(c.status)} &middot; ${c.tempo_sem_interacao?'Sem interacao: '+c.tempo_sem_interacao:''}</div>
    </div>
  `;

  empty.style.display='none';
  msgs.style.display='block';
  msgs.innerHTML='';

  if(!c.messages||!c.messages.length){
    msgs.innerHTML='<div style="text-align:center;color:#999;padding:40px;font-size:13px;position:relative;z-index:1">Sem mensagens</div>';
    return;
  }

  let lastDate='';
  c.messages.forEach(m=>{
    const msgDate=m.msg_time?formatDate(m.msg_time):'';
    if(msgDate&&msgDate!==lastDate){
      lastDate=msgDate;
      const divider=document.createElement('div');
      divider.className='date-divider';
      divider.innerHTML=`<span>${msgDate}</span>`;
      msgs.appendChild(divider);
    }

    const wrapper=document.createElement('div');
    wrapper.className='msg-wrapper';

    if(m.role==='system'){
      wrapper.style.alignItems='center';
      const bubble=document.createElement('div');
      bubble.className='msg-bubble msg-system';
      bubble.innerHTML=`${esc(m.content)}<span class="msg-time">${formatTime(m.msg_time)}</span>`;
      wrapper.appendChild(bubble);
    }else if(m.role==='user'){
      wrapper.style.alignItems='flex-start';
      const parsed=parseUserMessage(m.content);
      if(parsed.systemData){
        const toggle=document.createElement('div');
        toggle.className='system-data-toggle';
        toggle.textContent='\u25B6 Dados do sistema';
        const content=document.createElement('div');
        content.className='system-data-content';
        content.textContent=parsed.systemData;
        toggle.addEventListener('click',()=>{
          content.classList.toggle('open');
          toggle.textContent=content.classList.contains('open')?'\u25BC Dados do sistema':'\u25B6 Dados do sistema';
        });
        wrapper.appendChild(toggle);
        wrapper.appendChild(content);
      }
      const bubble=document.createElement('div');
      bubble.className='msg-bubble msg-user';
      bubble.innerHTML=`${formatMsgContent(parsed.clientMsg)}<span class="msg-time">${formatTime(m.msg_time)}</span>`;
      wrapper.appendChild(bubble);
    }else{
      wrapper.style.alignItems='flex-end';
      const bubble=document.createElement('div');
      bubble.className='msg-bubble msg-ai';
      bubble.innerHTML=`${formatMsgContent(m.content)}<span class="msg-time">${formatTime(m.msg_time)}</span>`;
      wrapper.appendChild(bubble);
    }
    msgs.appendChild(wrapper);
  });

  requestAnimationFrame(()=>msgs.scrollTop=msgs.scrollHeight);
}

function parseUserMessage(content){
  if(!content)return{clientMsg:'',systemData:null};
  // Try to split on "Mensagem(ns) do cliente:" or similar patterns
  const patterns=[
    /Mensagens?\s*(?:\((?:ns|s)\))?\s*do\s*cliente\s*:\s*/i,
    /Mensagem do cliente\s*:\s*/i,
    /---\s*Mensagem\s*---/i
  ];
  for(const p of patterns){
    const match=content.match(p);
    if(match){
      const idx=match.index;
      const sysData=content.substring(0,idx).trim();
      const clientMsg=content.substring(idx+match[0].length).trim();
      return{clientMsg:clientMsg||content,systemData:sysData||null};
    }
  }
  // Check if starts with "Dados Fornecidos" or system-like prefix
  if(/^(Dados\s+(Fornecidos|do\s+lead)|Nome:|Vidas:|Telefone:)/i.test(content.trim())){
    // Try to find where client text starts (after several \n separated key:value pairs)
    const lines=content.split('\n');
    let splitIdx=-1;
    let seenData=false;
    for(let i=0;i<lines.length;i++){
      const line=lines[i].trim();
      if(!line){
        if(seenData)splitIdx=i;
        continue;
      }
      if(/^(Dados|Nome|Vidas|Telefone|Email|Cidade|Idade|Contrata|CNPJ|CPF|Observa|Plano|Operadora|Valor|Motivo|Interesse|Rede|Contato|Bot|Consultor|Temperatura|Reagend|Desinteresse|Qtd|Acomoda|Coparticipa|Mensagens?\s*do)/i.test(line)){
        seenData=true;
      }else if(seenData&&splitIdx>=0){
        return{clientMsg:lines.slice(i).join('\n').trim(),systemData:lines.slice(0,i).join('\n').trim()};
      }
    }
    if(seenData){
      return{clientMsg:content,systemData:null};
    }
  }
  return{clientMsg:content,systemData:null};
}

function formatMsgContent(text){
  if(!text)return'';
  let s=esc(text);
  // Bold
  s=s.replace(/\*([^*]+)\*/g,'<b>$1</b>');
  // Links
  s=s.replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank" rel="noopener" style="color:#039be5">$1</a>');
  return s;
}

function esc(s){
  if(!s)return'';
  const d=document.createElement('div');
  d.textContent=s;
  return d.innerHTML;
}

function tempLabel(s){
  const m={quente:'Quente',morno:'Morno',frio:'Frio',desinteresse:'Desinteresse'};
  return m[s]||s||'';
}

// ── Right panel (details) ──
function renderDetails(c){
  const panel=$('#right-panel');
  panel.classList.add('visible');
  const name=c.lead?.nome||c.summary?.nome||'Desconhecido';
  const initial=name.charAt(0).toUpperCase();
  const color=statusColors[c.status]||'#999';
  const lead=c.lead||{};
  const sum=c.summary||{};

  const vidas=sum.vidas||[];
  const vidasHtml=vidas.length?`<ul>${vidas.map((v,i)=>`<li>Vida ${i+1}: ${v.idade||v.age||'?'} anos</li>`).join('')}</ul>`:'<dd>N/A</dd>';

  panel.innerHTML=`
    <div id="right-header">
      <div id="right-avatar" style="background:${color}">${initial}</div>
      <div id="right-name">${esc(name)}</div>
      <div id="right-phone">${esc(c.phone_display||'')}</div>
      ${sum.email?`<div id="right-email">${esc(sum.email)}</div>`:''}
    </div>

    ${detailSection('\u{1F4CB} Dados do Lead',`
      <dl>
        <dt>Vidas (${lead.qtd_vidas||vidas.length||'?'})</dt>
        <dd>${vidasHtml}</dd>
        <dt>Cidade</dt><dd>${esc(sum.cidade||'N/A')}</dd>
        <dt>Contratacao</dt><dd>${esc(sum.contratacao||'N/A')}</dd>
        ${sum.cnpj?`<dt>CNPJ</dt><dd>${esc(sum.cnpj)}</dd>`:''}
        ${sum.cpf?`<dt>CPF</dt><dd>${esc(sum.cpf)}</dd>`:''}
      </dl>
    `,true)}

    ${detailSection('\u{1F3E5} Plano Atual',`
      <dl>
        <dt>Plano</dt><dd>${esc(sum.plano_atual||'N/A')}</dd>
        ${sum.coparticipacao?`<dt>Coparticipacao</dt><dd>${esc(String(sum.coparticipacao))}</dd>`:''}
        ${sum.acomodacao?`<dt>Acomodacao</dt><dd>${esc(sum.acomodacao)}</dd>`:''}
        <dt>Motivo da busca</dt><dd>${esc(sum.motivo||'N/A')}</dd>
      </dl>
    `)}

    ${detailSection('\u{1F3AF} Interesse',`
      <dl>
        <dt>Interesse</dt><dd>${esc(sum.interesse||'N/A')}</dd>
        <dt>Rede preferencial</dt><dd>${esc(sum.rede_preferencial||'N/A')}</dd>
        <dt>Contato preferido</dt><dd>${esc(sum.contato||'N/A')}</dd>
      </dl>
    `)}

    ${detailSection('\u{1F4CA} Status',`
      <dl>
        <dt>Temperatura</dt><dd><span class="temp-badge temp-${c.status||'frio'}">${tempLabel(c.status)}</span></dd>
        <dt>Bot</dt><dd>${esc(sum.bot||c.bot||'N/A')}</dd>
        <dt>Consultor</dt><dd>${esc(c.consultor||sum.consultor||'N/A')}</dd>
        <dt>Mensagens</dt><dd>${c.message_count||0}</dd>
        ${lead.desinteresse?'<dt>Desinteresse</dt><dd>Sim</dd>':''}
        ${lead.reagendamento?`<dt>Reagendamento</dt><dd>${esc(lead.reagendamento)}</dd>`:''}
      </dl>
    `,true)}

    ${detailSection('\u{1F4DD} Observacoes',`
      <p style="font-size:12px;line-height:1.5">${esc(lead.observacoes||sum.obs_crm||'Sem observacoes')}</p>
    `)}

    ${detailSection('\u{23F0} Timing',`
      <dl>
        <dt>Primeiro contato</dt><dd>${formatDateTime(c.first_message_at)}</dd>
        <dt>Ultima mensagem</dt><dd>${formatDateTime(c.last_message_at)}</dd>
        <dt>Sem interacao</dt><dd>${esc(c.tempo_sem_interacao||'N/A')}</dd>
      </dl>
    `,true)}

    ${sum.formatted?detailSection('\u{1F4C4} Resumo completo',`<div class="formatted-block">${esc(sum.formatted)}</div>`):''}
  `;

  // Wire up toggles
  $$('.detail-section-header',panel).forEach(h=>{
    h.addEventListener('click',()=>{
      const body=h.nextElementSibling;
      const chev=$('.chevron',h);
      body.classList.toggle('open');
      chev.classList.toggle('open');
    });
  });
}

function detailSection(title,body,openByDefault=false){
  return`<div class="detail-section">
    <div class="detail-section-header"><span>${title}</span><span class="chevron${openByDefault?' open':''}">&#x25B6;</span></div>
    <div class="detail-section-body${openByDefault?' open':''}">${body}</div>
  </div>`;
}

// ── Init ──
loadData();
</script>
</body>
